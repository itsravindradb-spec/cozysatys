<style>

/* MODAL / BOTTOM SHEET */

/* DIVIDER */

/* SPINNER */

::-webkit-scrollbar{width:0;}

<script>
// ══════════════════════════════════════════════════════
//  MOCK DATA
// ══════════════════════════════════════════════════════
let mockRequests = [
  {rowIndex:2,propertyName:"Sunshine PG",roomNumber:"101",tenantName:"Arjun Sharma",mobile:"9876543210",timestamp:new Date(Date.now()-7200000).toISOString(),requestType:"Room Cleaning",comments:"Please clean room thoroughly, including bathroom.",status:"New",assignedTo:"",staffName:"",completionPhoto:"",managerVerified:false,csatScore:"",csatComment:""},
  {rowIndex:3,propertyName:"Sunshine PG",roomNumber:"203",tenantName:"Priya Mehta",mobile:"9123456780",timestamp:new Date(Date.now()-14400000).toISOString(),requestType:"Complaint",comments:"Water leakage near window sill since yesterday.",status:"Assigned",assignedTo:"S001",staffName:"Ramu",completionPhoto:"",managerVerified:false,csatScore:"",csatComment:""},
  {rowIndex:4,propertyName:"Green Nest PG",roomNumber:"305",tenantName:"Rahul Verma",mobile:"9988776655",timestamp:new Date(Date.now()-86400000).toISOString(),requestType:"Complaint",comments:"AC not working since morning.",status:"Work Done",assignedTo:"S002",staffName:"Sita",completionPhoto:"DEMO_PHOTO",managerVerified:false,csatScore:"",csatComment:""},
];
let mockNextRow = 5;

const MOCK_STAFF = [
  {staffId:"S001",pin:"1111",name:"Ramu Kumar",property:"Sunshine PG"},
  {staffId:"S002",pin:"2222",name:"Sita Devi",property:"Green Nest PG"},
];

// ══════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════
let _actx=null;
function getACtx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();if(_actx.state==="suspended")_actx.resume();return _actx;}
document.addEventListener("touchstart",getACtx,{once:true});
document.addEventListener("click",getACtx,{once:true});

// Old telephone ring sound — for staff assignment notification
function playOldPhoneRing(times=2){
  try{
    const ctx=getACtx();
    function ring(startT){
      // Simulate old rotary phone: alternating 440Hz + 480Hz (US ring pattern)
      const dur=0.4; const gap=0.2;
      for(let rep=0;rep<2;rep++){
        const t=startT+rep*(dur+gap);
        [440,480].forEach(freq=>{
          const o=ctx.createOscillator();
          const g=ctx.createGain();
          o.connect(g);g.connect(ctx.destination);
          o.type='square';
          o.frequency.value=freq;
          g.gain.setValueAtTime(0,t);
          g.gain.linearRampToValueAtTime(0.15,t+0.02);
          g.gain.setValueAtTime(0.15,t+dur-0.02);
          g.gain.linearRampToValueAtTime(0,t+dur);
          o.start(t);o.stop(t+dur);
        });
      }
    }
    for(let i=0;i<times;i++) ring(ctx.currentTime+i*1.4);
  }catch(e){}
}

// Pleasant chime — for tenant request closed notification
function playChime(freqs=[[523.25,0],[659.25,.18],[783.99,.34],[1046.5,.52]]){
  try{const ctx=getACtx();freqs.forEach(([f,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=f;const t=ctx.currentTime+d;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.55);o.start(t);o.stop(t+.6);});}catch(e){}
}

// Send PWA notification when page may be hidden
function sendPWANotif(title,body,tag){
  try{
    if('Notification' in window && Notification.permission==='granted' && window._swReg){
      navigator.serviceWorker.ready.then(reg=>{
        reg.active&&reg.active.postMessage({type:'NOTIFY',title,body,tag});
      });
    }
  }catch(e){}
}

function speakFemale(text){
  try{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const m=new SpeechSynthesisUtterance(text);m.rate=0.9;m.pitch=1.2;m.volume=1;function go(){const vs=window.speechSynthesis.getVoices();const hints=["female","woman","zira","samantha","karen","moira","veena","tessa","fiona","victoria"];let v=vs.find(v=>hints.some(h=>v.name.toLowerCase().includes(h))&&v.lang.startsWith("en"));if(!v)v=vs.find(v=>v.lang.startsWith("en")&&(v.name.toLowerCase().includes("female")||!v.name.toLowerCase().includes("male")));if(!v)v=vs.find(v=>v.lang.startsWith("en"));if(v)m.voice=v;window.speechSynthesis.speak(m);}if(window.speechSynthesis.getVoices().length)go();else window.speechSynthesis.addEventListener("voiceschanged",go,{once:true});}catch(e){}
}

// ══════════════════════════════════════════════════════
//  API LAYER
// ══════════════════════════════════════════════════════
async function api(params){
  if(DEMO_MODE) return demoAPI(params);
  const url=new URL(APPS_SCRIPT_URL);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  return (await fetch(url.toString())).json();
}

// For photo upload (POST needed for large base64)
// NOTE: use "text/plain" to avoid a CORS preflight that Apps Script does not answer.
// Apps Script still receives the JSON string via e.postData.contents.
async function apiPost(params){
  if(DEMO_MODE) return demoAPI(params);
  try{
    const r=await fetch(APPS_SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(params),redirect:"follow"});
    return await r.json();
  }catch(err){
    return {success:false,message:(err&&err.message)||"Network error"};
  }
}

function demoAPI(p){
  return new Promise(resolve=>setTimeout(()=>{
    if(p.action==="tenantLogin"){
      if(p.mobile==="9876543210"&&p.pin==="1234")
        resolve({success:true,tenant:{propertyName:"Sunshine PG",roomNumber:"101",tenantName:"Arjun Sharma",mobile:"9876543210"}});
      else resolve({success:false,message:"Invalid credentials.\nDemo: 9876543210 / PIN: 1234"});
    }
    else if(p.action==="staffLogin"){
      const s=MOCK_STAFF.find(s=>s.staffId===p.staffId&&s.pin===p.pin);
      if(s) resolve({success:true,staff:s});
      else resolve({success:false,message:"Invalid Staff ID or PIN.\nDemo: S001 / 1111"});
    }
    else if(p.action==="submitRequest"){
      const r={rowIndex:mockNextRow++,propertyName:p.propertyName,roomNumber:p.roomNumber,tenantName:p.tenantName,mobile:p.mobile,timestamp:new Date().toISOString(),requestType:p.requestType,comments:p.comments,status:"New",assignedTo:"",staffName:"",completionPhoto:"",managerVerified:false,csatScore:"",csatComment:""};
      mockRequests.push(r);resolve({success:true});
    }
    else if(p.action==="getRequests") resolve({success:true,requests:[...mockRequests]});
    else if(p.action==="getTenantRequests") resolve({success:true,requests:mockRequests.filter(r=>r.mobile===p.mobile)});
    else if(p.action==="getStaffRequests") resolve({success:true,requests:mockRequests.filter(r=>r.assignedTo===p.staffId||r.status==="New")});
    else if(p.action==="assignStaff"){
      mockRequests=mockRequests.map(r=>r.rowIndex==p.rowIndex?{...r,status:"Assigned",assignedTo:p.staffId,staffName:p.staffName}:r);
      resolve({success:true});
    }
    else if(p.action==="uploadCompletion"){
      mockRequests=mockRequests.map(r=>r.rowIndex==p.rowIndex?{...r,status:"Work Done",completionPhoto:p.photo}:r);
      resolve({success:true});
    }
    else if(p.action==="verifyAndClose"){
      mockRequests=mockRequests.map(r=>r.rowIndex==p.rowIndex?{...r,status:"Closed",managerVerified:true}:r);
      resolve({success:true});
    }
    else if(p.action==="submitCSAT"){
      mockRequests=mockRequests.map(r=>r.rowIndex==p.rowIndex?{...r,csatScore:p.score,csatComment:p.comment}:r);
      resolve({success:true});
    }
    else if(p.action==="getStaffList") resolve({success:true,staff:MOCK_STAFF});
    else resolve({success:false,message:"Unknown action"});
  },500));
}

// ══════════════════════════════════════════════════════
//  LOCAL STORAGE — persist sessions across page reloads
// ══════════════════════════════════════════════════════
const LS_KEYS={tenant:'cspg_tenant',staff:'cspg_staff',mAuth:'cspg_mauth',portal:'cspg_portal'};
function lsSave(key,data){try{localStorage.setItem(key,JSON.stringify(data));}catch(e){}}
function lsLoad(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsClear(key){try{localStorage.removeItem(key);}catch(e){}}

// Restore saved sessions
const _savedTenant=lsLoad(LS_KEYS.tenant);

function h(tag,attrs={},...children){
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class")el.className=v;
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="disabled"){if(v)el.disabled=true;}
    else if(["value","placeholder","src","alt","accept","capture","type","maxlength","rows"].includes(k))el[k]=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return el;
}
function render(){document.getElementById("app").innerHTML="";document.getElementById("app").appendChild(root());}
function ss(patch,skip=false){
  Object.assign(S,patch);
  // persist portal selection so it survives browser close
  if(patch.portal!==undefined) lsSave(LS_KEYS.portal, patch.portal);
  if(!skip)render();
}

async function doTLogin(){
  if(!S.tLoginMobile||!S.tLoginPin){ss({error:"Enter mobile and PIN"});return;}
  ss({loading:true,error:""});
  const res=await api({action:"tenantLogin",mobile:S.tLoginMobile,pin:S.tLoginPin});
  if(res.success){
    lsSave(LS_KEYS.tenant,res.tenant); // persist session
    lsSave(LS_KEYS.portal,'tenant');   // persist portal
    // load tenant requests to check for pending CSAT
    const rRes=await api({action:"getTenantRequests",mobile:S.tLoginMobile});
    const reqs=rRes.success?rRes.requests:[];
    const pendingCSAT=reqs.find(r=>r.status==="Closed"&&r.completionPhoto&&!r.csatScore);
    if(pendingCSAT){playChime();sendPWANotif("Service Complete!","Your request has been closed. Please rate the service.","tenant-csat");}
    ss({loading:false,tenant:res.tenant,tRequests:reqs,tScreen:pendingCSAT?"csat":"home",tNotifRequest:pendingCSAT||null,csatReqIdx:pendingCSAT?pendingCSAT.rowIndex:null,tLoginPin:""});
  } else ss({loading:false,error:res.message});
}

  const res=await api({action:"submitRequest",...S.tenant,requestType:S.tReqType,comments:S.tReqComment});
  if(res.success){playChime();ss({loading:false,tScreen:"success",tReqType:"",tReqComment:""});}

function tHistory(){
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",height:"100dvh"}});
  const userEl=h("div",{class:"tb-user"});
  userEl.appendChild(h("div",{class:"tb-uname"},S.tenant.tenantName));
  wrap.appendChild(topbar(userEl,()=>{lsClear(LS_KEYS.tenant);lsClear(LS_KEYS.portal);ss({portal:"home",tScreen:"login",tenant:null});},"My Requests"));
  const scr=h("div",{class:"screen"});
  const backRow=h("div",{style:{padding:"14px 14px 0"}});
  backRow.appendChild(h("button",{class:"btn btn-ghost",style:{maxWidth:"160px"},onClick:()=>ss({tScreen:"home"})},"← New Request"));
  scr.appendChild(backRow);

  if(S.tRequests.length===0){
    const em=h("div",{class:"empty"});
    em.appendChild(h("div",{class:"empty-ico"},"📭"));
    em.appendChild(h("div",{class:"empty-txt"},"No requests yet"));
    scr.appendChild(em);
  } else {
    const list=h("div",{class:"req-list"});
    [...S.tRequests].reverse().forEach(req=>{
      const card=h("div",{class:"req-card"});
      const sc=statusStripe(req.status);
      card.appendChild(h("div",{class:`req-stripe ${sc}`}));
      const body=h("div",{class:"req-body"});
      const top=h("div",{class:"req-top"});
      top.appendChild(h("div",{class:"req-name"},req.requestType));
      top.appendChild(statusBadge(req.status));
      body.appendChild(top);
      const meta=h("div",{class:"req-meta"});
      meta.innerHTML=`🕐 ${new Date(req.timestamp).toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"})}`;
      body.appendChild(meta);
      body.appendChild(h("div",{class:"req-comment"},`"${req.comments}"`));

      // Show completion photo if available
      if(req.completionPhoto && req.completionPhoto!=="DEMO_PHOTO"){
        body.appendChild(h("div",{style:{fontSize:"12px",color:"var(--muted)",marginBottom:"6px"}},"📸 Completion photo:"));
        body.appendChild(h("img",{src:req.completionPhoto,class:"photo-notif"}));
      } else if(req.completionPhoto==="DEMO_PHOTO"){
        body.appendChild(h("div",{class:"alert alert-ok",style:{fontSize:"12px"}},"📸 Completion photo attached (demo)"));
      }

      // CSAT button if closed and not yet rated
      if(req.status==="Closed"&&req.completionPhoto&&!req.csatScore){
        body.appendChild(h("button",{class:"btn btn-gold",style:{marginTop:"8px"},onClick:()=>ss({tScreen:"csat",tNotifRequest:req,csatReqIdx:req.rowIndex,csatScore:null,csatComment:""})},"⭐ Rate this service"));
      }
      if(req.csatScore){
        body.appendChild(h("div",{class:"alert alert-ok",style:{fontSize:"12px"}},`Your rating: ⭐ ${req.csatScore}/10 — Thank you!`));
      }
      card.appendChild(body);
      list.appendChild(card);
    });
    scr.appendChild(list);
  }
  wrap.appendChild(scr);
  return wrap;
}

function readPhoto(file){
  if(!file) return;
  // Improved compression: handle large images, show progress, handle errors
  ss({error:""},true); // clear any prior error
  const MAX_SIZE_MB=4; // if base64 > 4MB, compress more
  const reader=new FileReader();
  reader.onerror=()=>ss({error:"Could not read photo. Please try a different image.",stPhotoData:null});
  reader.onload=e=>{
    const img=new Image();
    img.onerror=()=>ss({error:"Invalid image file. Please choose a JPEG or PNG photo.",stPhotoData:null});
    img.onload=()=>{
      try{
        const canvas=document.createElement("canvas");
        const MAX=1024; // increased from 800 for better quality
        let w=img.width,ht=img.height;
        // Resize maintaining aspect ratio
        if(w>ht&&w>MAX){ht=Math.round(ht*MAX/w);w=MAX;}
        else if(ht>MAX){w=Math.round(w*MAX/ht);ht=MAX;}
        canvas.width=w;canvas.height=ht;
        const ctx2d=canvas.getContext("2d");
        ctx2d.fillStyle="#FFFFFF"; // white background
        ctx2d.fillRect(0,0,w,ht);
        ctx2d.drawImage(img,0,0,w,ht);
        // Try quality 0.8 first, reduce if too large
        let quality=0.8;
        let data=canvas.toDataURL("image/jpeg",quality);
        const sizeKB=Math.round(data.length*3/4/1024);
        if(sizeKB>MAX_SIZE_MB*1024){
          quality=0.6;
          data=canvas.toDataURL("image/jpeg",quality);
        }
        ss({stPhotoData:data,error:""});
      }catch(err){
        ss({error:"Image processing failed. Please try again or use a smaller image.",stPhotoData:null});
      }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

    sh.appendChild(h("img",{src:req.completionPhoto,class:"photo-notif"}));
  } else if(req.completionPhoto==="DEMO_PHOTO"){
    sh.appendChild(h("div",{class:"alert alert-ok",style:{marginBottom:"12px"}},"📸 Completion photo reviewed (demo mode)"));
  }

  const btn=h("button",{class:"btn btn-green",onClick:doVerifyClose},S.loading?h("span",{class:"spinner"}):"✅ Approve & Close Request");
  btn.disabled=S.loading;
  sh.appendChild(btn);
  sh.appendChild(h("div",{class:"alert alert-info",style:{marginTop:"12px",fontSize:"12px"}},"After closing, the tenant will be prompted for a CSAT rating (1-10) with the photo."));
  sh.appendChild(h("button",{class:"btn btn-ghost",style:{marginTop:"10px"},onClick:()=>ss({mVerifyReq:null})},"Cancel"));
  ov.appendChild(sh);
  return ov;
}

async function doVerifyClose(){
  ss({loading:true});
  const req=S.mVerifyReq||S.mCloseReq;
  const res=await api({action:"verifyAndClose",rowIndex:req.rowIndex});
  if(res.success){
    await loadMRequests(true);
    playChime(); // chime sound for closure
    speakFemale("Request verified and closed successfully.");
    sendPWANotif("Request Closed","Your service request has been completed. Please rate your experience.","mgr-close");
    ss({loading:false,mVerifyReq:null,mCloseReq:null,ok:"Request closed! Tenant will be prompted for CSAT rating."});
  } else ss({loading:false});
}

// ══════════════════════════════════════════════════════
//  SHARED HELPERS
// ══════════════════════════════════════════════════════
function statusStripe(s){
  if(s==="New")return "s-new";
  if(s==="Assigned")return "s-assigned";
  if(s==="Work Done")return "s-done";
  if(s==="Closed")return "s-closed";
  return "s-closed";
}
function statusBadge(s){
  const m={New:"b-new",Assigned:"b-assigned","Work Done":"b-done",Closed:"b-closed"};
  return h("span",{class:`badge ${m[s]||"b-closed"}`},s);
}

// ══════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════
render();

// After initial render, load data for restored sessions
if(_savedTenant){
  (async()=>{
    const rRes=await api({action:"getTenantRequests",mobile:_savedTenant.mobile});
    if(rRes.success){
      const reqs=rRes.requests;
      const pendingCSAT=reqs.find(r=>r.status==="Closed"&&r.completionPhoto&&!r.csatScore);
      if(pendingCSAT){
        playChime();
        sendPWANotif("Service Complete!","Your request has been closed. Please rate the service.","tenant-csat");
        ss({tRequests:reqs,tScreen:"csat",tNotifRequest:pendingCSAT,csatReqIdx:pendingCSAT.rowIndex,csatScore:null,csatComment:""});
      } else {
        ss({tRequests:reqs});
      }
    }
  })();
}
if(_savedStaff){
  (async()=>{
    const rRes=await api({action:"getStaffRequests",staffId:_savedStaff.staffId});
    if(rRes.success) ss({stRequests:rRes.requests});
  })();
}
</script>
